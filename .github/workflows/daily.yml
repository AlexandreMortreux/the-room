name: daily

on:
  schedule:
    - cron: "20 0 * * *" # 00:20 UTC = 08:20 UTC+8 (off the top-of-hour queue)
  workflow_dispatch:
    inputs:
      force:
        description: "On = PRODUCTION (real channel + ledger). Off = STAGING channel, ledger_staging.csv."
        type: boolean
        default: false
      resolve_test:
        description: "STAGING only: force a resolution (Template A card) by back-dating the oldest pending pair."
        type: boolean
        default: false
      weekly_test:
        description: "STAGING only: force the weekly watershed bet on a non-Sunday."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libs (cairo for SVG card rendering)
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
          TG_CHANNEL_ID_STAGING: ${{ secrets.TG_CHANNEL_ID_STAGING }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          # schedule -> production; manual -> staging unless force=true -> production
          STAGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force != 'true' && '1' || '0' }}
          FORCE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
          STAGE_RESOLVE_TEST: ${{ github.event.inputs.resolve_test == 'true' && '1' || '0' }}
          STAGE_WEEKLY_TEST: ${{ github.event.inputs.weekly_test == 'true' && '1' || '0' }}
        run: python main.py

      - name: Commit ledger if changed
        run: |
          if ! git diff --quiet ledger.csv; then
            git config user.name "the-room-bot"
            git config user.email "the-room-bot@users.noreply.github.com"
            git add ledger.csv
            git commit -m "ledger: daily update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "ledger unchanged, nothing to commit"
          fi
